---
name: Cancel
description: Cancel in-progress and queued workflow runs

inputs:
  repo:
    description: Repository (owner/name)
    required: false
    default: ${{ github.repository }}
  branch:
    description: Branch to cancel runs for
    required: true
  token:
    description: GitHub token
    required: false
    default: ${{ secrets.GITHUB_TOKEN }}

runs:
  using: composite
  steps:
    - name: Cancel in-progress runs
      shell: bash
      run: |
        ids=$(gh run list --status in_progress --branch "$BRANCH" -R "$REPO" --json databaseId --jq '.[].databaseId')
        [ -n "$ids" ] && echo "$ids" | xargs -I{} gh run cancel {} -R "$REPO"
        [ -z "$ids" ] || echo "Canceled: $ids"
      env:
        BRANCH: ${{ inputs.branch }}
        REPO: ${{ inputs.repo }}
        GH_TOKEN: ${{ inputs.token }}

    - name: Cancel queued runs
      shell: bash
      run: |
        ids=$(gh run list --status queued --branch "$BRANCH" -R "$REPO" --json databaseId --jq '.[].databaseId')
        [ -n "$ids" ] && echo "$ids" | xargs -I{} gh run cancel {} -R "$REPO"
      env:
        BRANCH: ${{ inputs.branch }}
        REPO: ${{ inputs.repo }}
        GH_TOKEN: ${{ inputs.token }}