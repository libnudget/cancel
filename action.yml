---
name: Cancel
description: Cancel in-progress and queued workflow runs

inputs:
  repo:
    description: Repository (owner/name)
    required: false
    default: ${{ github.repository }}
  branch:
    description: Branch to cancel runs for
    required: false
  pr_number:
    description: PR number to get branch from
    required: false
  token:
    description: GitHub token
    required: true

runs:
  using: composite
  steps:
    - name: Get branch from PR
      if: inputs.pr_number != ''
      shell: bash
      run: |
        BRANCH=$(gh pr view "$PR_NUM" -R "$REPO" --json headRefName --jq '.headRefName')
        echo "BRANCH=$BRANCH" >> $GITHUB_OUTPUT
      env:
        PR_NUM: ${{ inputs.pr_number }}
        REPO: ${{ inputs.repo }}
        GH_TOKEN: ${{ inputs.token }}

    - name: Cancel in-progress runs
      shell: bash
      run: |
        if [ -n "$PR_NUM" ]; then
          CANCEL_BRANCH=$(gh pr view "$PR_NUM" -R "$REPO" --json headRefName --jq '.headRefName')
        else
          CANCEL_BRANCH="$BRANCH"
        fi
        ids=$(gh run list --status in_progress --branch "$CANCEL_BRANCH" -R "$REPO" --json databaseId --jq '.[].databaseId' 2>/dev/null || echo "")
        if [ -n "$ids" ]; then
          echo "$ids" | xargs -I{} gh run cancel {} -R "$REPO" 2>/dev/null || true
          echo "Canceled in-progress: $ids"
        else
          echo "No in-progress runs"
        fi
      env:
        BRANCH: ${{ inputs.branch }}
        PR_NUM: ${{ inputs.pr_number }}
        REPO: ${{ inputs.repo }}
        GH_TOKEN: ${{ inputs.token }}

    - name: Cancel queued runs
      shell: bash
      run: |
        if [ -n "$PR_NUM" ]; then
          CANCEL_BRANCH=$(gh pr view "$PR_NUM" -R "$REPO" --json headRefName --jq '.headRefName')
        else
          CANCEL_BRANCH="$BRANCH"
        fi
        ids=$(gh run list --status queued --branch "$CANCEL_BRANCH" -R "$REPO" --json databaseId --jq '.[].databaseId' 2>/dev/null || echo "")
        if [ -n "$ids" ]; then
          echo "$ids" | xargs -I{} gh run cancel {} -R "$REPO" 2>/dev/null || true
          echo "Canceled queued: $ids"
        else
          echo "No queued runs"
        fi
      env:
        BRANCH: ${{ inputs.branch }}
        PR_NUM: ${{ inputs.pr_number }}
        REPO: ${{ inputs.repo }}
        GH_TOKEN: ${{ inputs.token }}