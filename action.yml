---
name: Cancel
description: Cancel in-progress and queued workflow runs

inputs:
  repo:
    description: Repository (owner/name)
    required: false
    default: ${{ github.repository }}
  branch:
    description: Branch to cancel runs for
    required: true
  token:
    description: GitHub token
    required: true

runs:
  using: composite
  steps:
    - name: Cancel in-progress runs
      shell: bash
      run: |
        ids=$(gh run list --status in_progress --branch "$BRANCH" -R "$REPO" --json databaseId --jq '.[].databaseId' 2>/dev/null || echo "")
        if [ -n "$ids" ]; then
          echo "$ids" | xargs -I{} gh run cancel {} -R "$REPO" 2>/dev/null || true
          echo "Canceled in-progress: $ids"
        else
          echo "No in-progress runs"
        fi
      env:
        BRANCH: ${{ inputs.branch }}
        REPO: ${{ inputs.repo }}
        GH_TOKEN: ${{ inputs.token }}

    - name: Cancel queued runs
      shell: bash
      run: |
        ids=$(gh run list --status queued --branch "$BRANCH" -R "$REPO" --json databaseId --jq '.[].databaseId' 2>/dev/null || echo "")
        if [ -n "$ids" ]; then
          echo "$ids" | xargs -I{} gh run cancel {} -R "$REPO" 2>/dev/null || true
          echo "Canceled queued: $ids"
        else
          echo "No queued runs"
        fi
      env:
        BRANCH: ${{ inputs.branch }}
        REPO: ${{ inputs.repo }}
        GH_TOKEN: ${{ inputs.token }}